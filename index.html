<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>son•iq — Lecteur Musique</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0d0d14;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .app {
      display: grid;
      grid-template-columns: 230px 1fr;
      grid-template-rows: 1fr 90px;
      height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: #111119;
      padding: 22px 14px;
      border-right: 0.5px solid rgba(255,255,255,0.07);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      grid-row: 1/2;
    }

    .logo {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.5px;
      padding: 0 8px;
      margin-bottom: 30px;
    }
    .logo span { color: #a78bfa; }

    .nav-label {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0 8px;
      margin: 18px 0 6px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 11px; border-radius: 8px;
      font-size: 13.5px; color: rgba(255,255,255,0.5);
      cursor: pointer; transition: all 0.12s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .nav-item.active { background: rgba(167,139,250,0.13); color: #a78bfa; font-weight: 500; }

    .history-item {
      display: flex; align-items: center; gap: 9px;
      padding: 6px 8px; border-radius: 7px; cursor: pointer;
      transition: background 0.12s;
    }
    .history-item:hover { background: rgba(255,255,255,0.05); }
    .h-thumb { width: 36px; height: 36px; border-radius: 5px; object-fit: cover; flex-shrink:0; background:#222; }
    .h-info { flex:1; min-width:0; }
    .h-title { font-size: 11.5px; color: rgba(255,255,255,0.7); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .h-ch { font-size: 10.5px; color: rgba(255,255,255,0.3); }

    /* ── MAIN ── */
    .main {
      background: linear-gradient(180deg, #18103a 0%, #0d0d14 40%);
      padding: 22px 28px;
      overflow-y: auto;
      grid-row: 1/2;
    }

    .search-row { display: flex; gap: 10px; margin-bottom: 22px; }

    .search-input {
      flex:1; background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.13);
      border-radius: 25px; padding: 11px 18px;
      color: #fff; font-size: 14px;
      font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.3); }
    .search-input:focus { border-color: rgba(167,139,250,0.6); }

    .search-btn {
      background: #a78bfa; border: none; border-radius: 25px;
      padding: 11px 22px; color: #fff; font-size: 14px;
      font-family: inherit; font-weight: 600; cursor: pointer;
      transition: opacity 0.12s;
    }
    .search-btn:hover { opacity: 0.85; }
    .search-btn:disabled { opacity: 0.4; cursor: default; }

    .section-label {
      font-size: 15px; font-weight: 600; color: #fff;
      margin-bottom: 14px;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    .result-card {
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 11px; overflow: hidden;
      cursor: pointer; transition: transform 0.12s, background 0.12s;
    }
    .result-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.08); }
    .result-card.playing { border-color: rgba(167,139,250,0.5); background: rgba(167,139,250,0.09); }

    .thumb-wrap { position: relative; aspect-ratio: 16/9; overflow: hidden; }
    .thumb-img { width:100%; height:100%; object-fit:cover; display:block; }
    .play-overlay {
      position:absolute; inset:0;
      background: rgba(0,0,0,0.4);
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition: opacity 0.15s;
    }
    .result-card:hover .play-overlay,
    .result-card.playing .play-overlay { opacity:1; }

    .card-info { padding: 9px 11px; }
    .card-title {
      font-size: 12.5px; color: rgba(255,255,255,0.88); font-weight: 500;
      line-height: 1.4; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-ch {
      font-size: 11px; color: rgba(255,255,255,0.35);
      margin-top: 4px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .fav-btn { cursor: pointer; font-size: 14px; user-select: none; }
    .fav-btn:hover { transform: scale(1.2); }

    /* States */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 60px 0;
      color: rgba(255,255,255,0.2);
    }
    .empty-icon { font-size: 48px; }
    .empty-text { font-size: 14px; text-align: center; line-height: 1.7; }

    .loading-row {
      display:flex; align-items:center; justify-content:center;
      gap: 10px; padding: 40px 0; color: rgba(255,255,255,0.4); font-size: 14px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(167,139,250,0.25);
      border-top-color: #a78bfa; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PLAYER BAR ── */
    .player-bar {
      grid-column: 1/3; grid-row: 2/3;
      background: rgba(12,12,20,0.98);
      border-top: 0.5px solid rgba(255,255,255,0.08);
      display: flex; align-items: center;
      padding: 0 22px; gap: 18px;
    }

    .now-playing {
      display: flex; align-items: center; gap: 12px;
      width: 220px; flex-shrink: 0;
    }
    .now-thumb-wrap {
      width: 46px; height: 46px; border-radius: 8px;
      overflow: hidden; flex-shrink: 0; background: #222;
    }
    .now-thumb-wrap img { width:100%; height:100%; object-fit:cover; }
    .now-placeholder {
      width:100%; height:100%;
      background: linear-gradient(135deg,#6d28d9,#4c1d95);
      display:flex; align-items:center; justify-content:center;
    }
    .now-info { flex:1; min-width:0; }
    .now-title { font-size: 13px; font-weight: 500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .now-ch { font-size: 11px; color: rgba(255,255,255,0.35); margin-top:2px; }

    .controls { flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .ctrl-btns { display:flex; align-items:center; gap:20px; }

    .ctrl-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.45); cursor: pointer;
      display:flex; align-items:center; justify-content:center;
      padding: 4px; border-radius: 50%; transition: color 0.12s;
    }
    .ctrl-btn:hover { color: #fff; }

    .play-btn {
      width: 38px; height: 38px; background: #fff; border: none;
      border-radius: 50%; cursor: pointer;
      display:flex; align-items:center; justify-content:center;
      transition: transform 0.1s, background 0.12s;
    }
    .play-btn:hover { transform: scale(1.07); background: #e9e9e9; }

    .progress-wrap { display:flex; align-items:center; gap:10px; width:100%; max-width:500px; }
    .time { font-size: 11px; color: rgba(255,255,255,0.3); min-width: 32px; }

    .prog-track {
      flex:1; height: 4px; background: rgba(255,255,255,0.1);
      border-radius: 2px; cursor: pointer; position: relative;
    }
    .prog-track:hover { height: 5px; }
    .prog-fill { height:100%; background: #a78bfa; border-radius:2px; transition: width 0.8s linear; }

    .vol-wrap { display:flex; align-items:center; gap:8px; width:130px; flex-shrink:0; }
    .vol-track { flex:1; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; cursor:pointer; }
    .vol-fill { height:100%; background:rgba(255,255,255,0.45); border-radius:2px; }

    /* ── RESPONSIVE MOBILE ── */
    @media (max-width: 640px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 1fr 80px; }
      .sidebar { display: none; }
      .main { padding: 16px; }
      .results-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
      .now-playing { width: 150px; }
      .controls { max-width: 200px; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">son<span>•</span>iq</div>

    <div class="nav-label">Menu</div>
    <div class="nav-item active" id="navHome" onclick="goHome()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Accueil
    </div>
    <div class="nav-item" id="navFavs" onclick="showFavs()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      Favoris
    </div>

    <div class="nav-label">Récemment écouté</div>
    <div id="historyList">
      <div style="padding:8px 10px;font-size:11.5px;color:rgba(255,255,255,0.2);">Rien encore...</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="search-row">
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="🎵  Recherche une chanson, artiste..."
        onkeydown="if(event.key==='Enter') doSearch()"
      />
      <button class="search-btn" id="searchBtn" onclick="doSearch()">Rechercher</button>
    </div>
    <div id="mainContent">
      <div class="empty-state">
        <div class="empty-icon">🎶</div>
        <div class="empty-text">
          Recherche une chanson ou un artiste<br>pour commencer à écouter
        </div>
      </div>
    </div>
  </main>

  <!-- PLAYER BAR -->
  <div class="player-bar">
    <div class="now-playing">
      <div class="now-thumb-wrap">
        <img id="nowThumbImg" src="" alt="" style="display:none" />
        <div class="now-placeholder" id="nowPlaceholder">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
      </div>
      <div class="now-info">
        <div class="now-title" id="nowTitle">Aucune lecture</div>
        <div class="now-ch" id="nowCh">—</div>
      </div>
    </div>

    <div class="controls">
      <div class="ctrl-btns">
        <button class="ctrl-btn" onclick="prevTrack()" title="Précédent">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="play-btn" id="playBtn" onclick="togglePlay()">
          <svg id="playIcon" width="15" height="15" viewBox="0 0 24 24" fill="#0d0d14"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="nextTrack()" title="Suivant">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18 14.5 12 6 6v12zm8.5-12v12h2V6h-2z"/></svg>
        </button>
      </div>
      <div class="progress-wrap">
        <span class="time" id="curTime">0:00</span>
        <div class="prog-track" onclick="seekTo(event)">
          <div class="prog-fill" id="progFill" style="width:0%"></div>
        </div>
        <span class="time" id="totTime">0:00</span>
      </div>
    </div>

    <div class="vol-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.35)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <div class="vol-track" onclick="setVol(event)">
        <div class="vol-fill" id="volFill" style="width:70%"></div>
      </div>
    </div>
  </div>

</div>

<!-- YouTube IFrame (hidden) -->
<div id="yt-player" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────
const API_KEY = 'AIzaSyDomQ_Lq4r-2OMTCNaJlysUPMHelSLsRlk';

// ─── STATE ────────────────────────────────────────────
let results   = [];
let favorites = JSON.parse(localStorage.getItem('soniq_favs') || '[]');
let history   = JSON.parse(localStorage.getItem('soniq_hist') || '[]');
let currentIdx  = -1;
let currentList = [];
let isPlaying = false;
let player    = null;
let ytReady   = false;
let pendingId = null;
let progInterval = null;

// ─── HELPERS ──────────────────────────────────────────
const $ = id => document.getElementById(id);

function fmt(s) {
  s = Math.floor(s || 0);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

// ─── YOUTUBE API ──────────────────────────────────────
const ytScript = document.createElement('script');
ytScript.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(ytScript);

window.onYouTubeIframeAPIReady = () => {
  player = new YT.Player('yt-player', {
    height: '1', width: '1',
    playerVars: { autoplay: 1, playsinline: 1 },
    events: {
      onReady: () => {
        ytReady = true;
        player.setVolume(70);
        if (pendingId) { player.loadVideoById(pendingId); pendingId = null; }
      },
      onStateChange: e => {
        if (e.data === YT.PlayerState.PLAYING)  { isPlaying = true;  updatePlayBtn(); }
        if (e.data === YT.PlayerState.PAUSED)   { isPlaying = false; updatePlayBtn(); }
        if (e.data === YT.PlayerState.ENDED)    { nextTrack(); }
      }
    }
  });
};

// ─── SEARCH ───────────────────────────────────────────
async function doSearch() {
  const q = $('searchInput').value.trim();
  if (!q) return;

  $('searchBtn').disabled = true;
  $('searchBtn').textContent = '...';
  $('mainContent').innerHTML = '<div class="loading-row"><div class="spinner"></div>Recherche en cours...</div>';
  setNav('home');

  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&maxResults=16&q=${encodeURIComponent(q)}&key=${API_KEY}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (data.error) throw new Error(data.error.message);

    results = (data.items || []).map(item => ({
      id:      item.id.videoId,
      title:   item.snippet.title,
      channel: item.snippet.channelTitle,
      thumb:   item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url
    }));

    currentList = results;
    renderGrid(results);
  } catch(e) {
    $('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-text">Erreur : ${e.message}</div>
      </div>`;
  } finally {
    $('searchBtn').disabled = false;
    $('searchBtn').textContent = 'Rechercher';
  }
}

// ─── RENDER GRID ──────────────────────────────────────
function renderGrid(list, label) {
  if (!list.length) {
    $('mainContent').innerHTML = '<div class="empty-state"><div class="empty-icon">😕</div><div class="empty-text">Aucun résultat.</div></div>';
    return;
  }
  $('mainContent').innerHTML = `
    <div class="section-label">${label || 'Résultats'} <span style="font-size:12px;color:rgba(255,255,255,0.3);font-weight:400;">(${list.length})</span></div>
    <div class="results-grid" id="grid"></div>
  `;
  list.forEach((v, i) => {
    const isFav = favorites.some(f => f.id === v.id);
    const isNow = currentList[currentIdx]?.id === v.id;
    const card  = document.createElement('div');
    card.className = 'result-card' + (isNow ? ' playing' : '');
    card.dataset.idx = i;
    card.innerHTML = `
      <div class="thumb-wrap">
        <img class="thumb-img" src="${v.thumb}" alt="" />
        <div class="play-overlay">
          ${isNow && isPlaying
            ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
            : '<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>'
          }
        </div>
      </div>
      <div class="card-info">
        <div class="card-title">${v.title}</div>
        <div class="card-ch">
          <span>${v.channel}</span>
          <span class="fav-btn" data-id="${v.id}" data-i="${i}" onclick="toggleFav(event)">${isFav ? '♥' : '♡'}</span>
        </div>
      </div>
    `;
    card.addEventListener('click', e => {
      if (e.target.classList.contains('fav-btn')) return;
      currentList = list;
      playTrack(i);
    });
    $('grid').appendChild(card);
  });
}

// ─── PLAY ─────────────────────────────────────────────
function playTrack(idx) {
  if (!currentList[idx]) return;
  currentIdx = idx;
  const v = currentList[idx];

  $('nowTitle').textContent = v.title;
  $('nowCh').textContent    = v.channel;
  $('nowThumbImg').src      = v.thumb;
  $('nowThumbImg').style.display   = 'block';
  $('nowPlaceholder').style.display = 'none';

  if (ytReady) {
    player.loadVideoById(v.id);
  } else {
    pendingId = v.id;
  }

  isPlaying = true;
  updatePlayBtn();
  startProgress();
  addToHistory(v);
  renderGrid(currentList, currentList === favorites ? 'Favoris' : 'Résultats');
}

function togglePlay() {
  if (currentIdx < 0) return;
  if (!ytReady) return;
  isPlaying ? player.pauseVideo() : player.playVideo();
}

function nextTrack() {
  if (!currentList.length) return;
  playTrack((currentIdx + 1) % currentList.length);
}

function prevTrack() {
  if (!currentList.length) return;
  playTrack((currentIdx - 1 + currentList.length) % currentList.length);
}

function updatePlayBtn() {
  $('playIcon').innerHTML = isPlaying
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

// ─── PROGRESS ─────────────────────────────────────────
function startProgress() {
  clearInterval(progInterval);
  $('progFill').style.width = '0%';
  $('curTime').textContent  = '0:00';
  $('totTime').textContent  = '...';
  progInterval = setInterval(() => {
    if (!ytReady || !player.getCurrentTime) return;
    try {
      const cur = player.getCurrentTime() || 0;
      const dur = player.getDuration()    || 1;
      $('progFill').style.width = (cur / dur * 100) + '%';
      $('curTime').textContent  = fmt(cur);
      $('totTime').textContent  = fmt(dur);
    } catch(_) {}
  }, 1000);
}

function seekTo(e) {
  if (!ytReady) return;
  const r = e.currentTarget.getBoundingClientRect();
  player.seekTo((e.clientX - r.left) / r.width * (player.getDuration() || 0), true);
}

function setVol(e) {
  const r   = e.currentTarget.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  $('volFill').style.width = (pct * 100) + '%';
  if (ytReady) player.setVolume(Math.round(pct * 100));
}

// ─── FAVORITES ────────────────────────────────────────
function toggleFav(e) {
  e.stopPropagation();
  const id  = e.target.dataset.id;
  const idx = parseInt(e.target.dataset.i);
  const v   = currentList[idx];
  const fi  = favorites.findIndex(f => f.id === id);
  if (fi >= 0) {
    favorites.splice(fi, 1);
    e.target.textContent = '♡';
  } else {
    favorites.push(v);
    e.target.textContent = '♥';
  }
  localStorage.setItem('soniq_favs', JSON.stringify(favorites));
  updateNavFavBadge();
}

function showFavs() {
  setNav('favs');
  currentList = favorites;
  currentIdx  = 0;
  if (!favorites.length) {
    $('mainContent').innerHTML = '<div class="empty-state"><div class="empty-icon">♡</div><div class="empty-text">Aucun favori encore.<br>Clique sur ♡ sur une chanson pour l\'ajouter.</div></div>';
    return;
  }
  renderGrid(favorites, 'Favoris');
}

function goHome() {
  setNav('home');
  if (results.length) {
    currentList = results;
    renderGrid(results);
  } else {
    $('mainContent').innerHTML = '<div class="empty-state"><div class="empty-icon">🎶</div><div class="empty-text">Recherche une chanson ou un artiste<br>pour commencer à écouter</div></div>';
  }
}

function updateNavFavBadge() {
  const label = favorites.length ? `Favoris (${favorites.length})` : 'Favoris';
  $('navFavs').querySelector('svg').nextSibling.textContent = ' ' + label;
}

// ─── HISTORY ──────────────────────────────────────────
function addToHistory(v) {
  history = history.filter(h => h.id !== v.id);
  history.unshift(v);
  if (history.length > 8) history.pop();
  localStorage.setItem('soniq_hist', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const list = $('historyList');
  list.innerHTML = '';
  if (!history.length) {
    list.innerHTML = '<div style="padding:8px 10px;font-size:11.5px;color:rgba(255,255,255,0.2);">Rien encore...</div>';
    return;
  }
  history.forEach((v, i) => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <img class="h-thumb" src="${v.thumb}" alt="" />
      <div class="h-info">
        <div class="h-title">${v.title}</div>
        <div class="h-ch">${v.channel}</div>
      </div>
    `;
    item.onclick = () => {
      currentList = history;
      playTrack(i);
      setNav('home');
    };
    list.appendChild(item);
  });
}

function setNav(which) {
  $('navHome').classList.toggle('active', which === 'home');
  $('navFavs').classList.toggle('active', which === 'favs');
}

// ─── INIT ─────────────────────────────────────────────
renderHistory();
updateNavFavBadge();
</script>
</body>
</html>
