<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>son•iq</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --purple:#a78bfa;
      --purple-dark:#7c3aed;
      --bg:#0d0d14;
      --bg2:#111119;
      --bg3:#1a1a2a;
      --border:rgba(255,255,255,0.08);
      --text:rgba(255,255,255,0.85);
      --muted:rgba(255,255,255,0.35);
      --dim:rgba(255,255,255,0.12);
    }
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

    /* ── AUTH SCREEN ── */
    #authScreen{
      position:fixed;inset:0;background:var(--bg);
      display:flex;align-items:center;justify-content:center;
      z-index:100;
    }
    .auth-card{
      width:100%;max-width:400px;padding:40px;
      background:var(--bg2);border:0.5px solid var(--border);
      border-radius:20px;
    }
    .auth-logo{font-size:28px;font-weight:800;text-align:center;margin-bottom:6px;letter-spacing:-1px;}
    .auth-logo span{color:var(--purple);}
    .auth-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:30px;}
    .auth-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:24px;}
    .auth-tab{
      flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;
      border-radius:8px;cursor:pointer;color:var(--muted);transition:all .15s;
    }
    .auth-tab.active{background:var(--purple);color:#fff;}
    .auth-form{display:flex;flex-direction:column;gap:12px;}
    .auth-input{
      background:rgba(255,255,255,0.06);border:0.5px solid var(--border);
      border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;
      font-family:inherit;outline:none;transition:border-color .15s;
    }
    .auth-input::placeholder{color:var(--muted);}
    .auth-input:focus{border-color:rgba(167,139,250,0.5);}
    .auth-btn{
      background:var(--purple);border:none;border-radius:10px;
      padding:13px;color:#fff;font-size:14px;font-weight:600;
      font-family:inherit;cursor:pointer;transition:opacity .12s;
    }
    .auth-btn:hover{opacity:.85;}
    .auth-btn:disabled{opacity:.4;cursor:default;}
    .auth-divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;margin:4px 0;}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:0.5px;background:var(--border);}
    .oauth-btn{
      display:flex;align-items:center;justify-content:center;gap:10px;
      background:rgba(255,255,255,0.05);border:0.5px solid var(--border);
      border-radius:10px;padding:11px;cursor:pointer;font-size:13px;
      font-family:inherit;color:var(--text);transition:background .12s;
    }
    .oauth-btn:hover{background:rgba(255,255,255,0.09);}
    .auth-error{font-size:12.5px;color:#f87171;text-align:center;min-height:18px;}
    .guest-link{text-align:center;font-size:12.5px;color:var(--muted);margin-top:12px;cursor:pointer;text-decoration:underline;}
    .guest-link:hover{color:#fff;}

    /* ── APP LAYOUT ── */
    #app{display:none;grid-template-columns:230px 1fr;grid-template-rows:1fr 90px;height:100vh;}

    /* ── SIDEBAR ── */
    .sidebar{
      background:var(--bg2);padding:20px 14px;
      border-right:0.5px solid var(--border);
      display:flex;flex-direction:column;overflow-y:auto;
      grid-row:1/2;
    }
    .logo{font-size:20px;font-weight:800;padding:0 8px;margin-bottom:28px;letter-spacing:-.5px;}
    .logo span{color:var(--purple);}
    .user-chip{
      display:flex;align-items:center;gap:9px;
      background:rgba(255,255,255,0.05);border-radius:10px;
      padding:8px 10px;margin-bottom:18px;
    }
    .user-avatar{
      width:30px;height:30px;border-radius:50%;
      background:var(--purple-dark);display:flex;align-items:center;
      justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;
    }
    .user-name{font-size:12.5px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .logout-btn{font-size:11px;color:var(--muted);cursor:pointer;flex-shrink:0;}
    .logout-btn:hover{color:#fff;}
    .nav-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:0 8px;margin:16px 0 6px;}
    .nav-item{
      display:flex;align-items:center;gap:9px;padding:8px 10px;
      border-radius:8px;font-size:13px;color:rgba(255,255,255,.5);
      cursor:pointer;transition:all .12s;
    }
    .nav-item:hover{background:rgba(255,255,255,.05);color:#fff;}
    .nav-item.active{background:rgba(167,139,250,.13);color:var(--purple);font-weight:500;}
    .history-item{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:7px;cursor:pointer;transition:background .12s;}
    .history-item:hover{background:rgba(255,255,255,.05);}
    .h-thumb{width:34px;height:34px;border-radius:5px;object-fit:cover;flex-shrink:0;background:#222;}
    .h-info{flex:1;min-width:0;}
    .h-title{font-size:11.5px;color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .h-ch{font-size:10.5px;color:var(--muted);}

    /* ── MAIN ── */
    .main{
      background:linear-gradient(180deg,#18103a 0%,var(--bg) 40%);
      padding:22px 26px;overflow-y:auto;grid-row:1/2;
    }
    .search-row{display:flex;gap:10px;margin-bottom:24px;}
    .search-input{
      flex:1;background:rgba(255,255,255,.07);border:0.5px solid rgba(255,255,255,.13);
      border-radius:25px;padding:11px 18px;color:#fff;font-size:14px;
      font-family:inherit;outline:none;transition:border-color .15s;
    }
    .search-input::placeholder{color:var(--muted);}
    .search-input:focus{border-color:rgba(167,139,250,.6);}
    .search-btn{
      background:var(--purple);border:none;border-radius:25px;
      padding:11px 22px;color:#fff;font-size:14px;font-family:inherit;
      font-weight:600;cursor:pointer;transition:opacity .12s;
    }
    .search-btn:hover{opacity:.85;}
    .search-btn:disabled{opacity:.4;cursor:default;}

    /* Home sections */
    .section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
    .section-title{font-size:16px;font-weight:700;color:#fff;}
    .section-more{font-size:12px;color:var(--muted);cursor:pointer;}
    .section-more:hover{color:var(--purple);}

    /* Genre pills */
    .genre-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px;}
    .genre-pill{
      padding:7px 16px;border-radius:20px;font-size:12.5px;font-weight:500;
      cursor:pointer;border:0.5px solid var(--border);color:var(--muted);
      transition:all .15s;background:transparent;font-family:inherit;
    }
    .genre-pill:hover,.genre-pill.active{background:var(--purple);border-color:var(--purple);color:#fff;}

    /* Cards grid */
    .cards-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
      gap:14px;margin-bottom:28px;
    }
    .card{
      background:rgba(255,255,255,.04);border:0.5px solid var(--border);
      border-radius:11px;overflow:hidden;cursor:pointer;
      transition:transform .12s,background .12s;
    }
    .card:hover{transform:translateY(-3px);background:rgba(255,255,255,.07);}
    .card.playing{border-color:rgba(167,139,250,.5);background:rgba(167,139,250,.09);}
    .thumb-wrap{position:relative;aspect-ratio:16/9;overflow:hidden;}
    .thumb-img{width:100%;height:100%;object-fit:cover;display:block;}
    .play-overlay{
      position:absolute;inset:0;background:rgba(0,0,0,.4);
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .15s;
    }
    .card:hover .play-overlay,.card.playing .play-overlay{opacity:1;}
    .card-info{padding:9px 11px;}
    .card-title{font-size:12.5px;color:rgba(255,255,255,.88);font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .card-ch{font-size:11px;color:var(--muted);margin-top:4px;display:flex;align-items:center;justify-content:space-between;}
    .fav-btn{cursor:pointer;font-size:14px;user-select:none;transition:transform .1s;}
    .fav-btn:hover{transform:scale(1.3);}

    /* States */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 0;color:var(--muted);}
    .empty-icon{font-size:48px;}
    .empty-text{font-size:14px;text-align:center;line-height:1.7;}
    .loading-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px 0;color:var(--muted);font-size:14px;}
    .spinner{width:20px;height:20px;border:2px solid rgba(167,139,250,.25);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Guest banner */
    .guest-banner{
      background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(167,139,250,.1));
      border:0.5px solid rgba(167,139,250,.3);border-radius:12px;
      padding:16px 20px;margin-bottom:22px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .guest-banner p{font-size:13px;color:rgba(255,255,255,.7);line-height:1.5;}
    .banner-btn{
      background:var(--purple);border:none;border-radius:8px;
      padding:9px 16px;color:#fff;font-size:13px;font-weight:600;
      font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;
    }

    /* ── PLAYER BAR ── */
    .player-bar{
      grid-column:1/3;grid-row:2/3;
      background:rgba(10,10,18,.98);border-top:0.5px solid var(--border);
      display:flex;align-items:center;padding:0 20px;gap:16px;
    }
    .now-playing{display:flex;align-items:center;gap:12px;width:210px;flex-shrink:0;}
    .now-thumb-wrap{width:46px;height:46px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#222;}
    .now-thumb-wrap img{width:100%;height:100%;object-fit:cover;}
    .now-placeholder{width:100%;height:100%;background:linear-gradient(135deg,#6d28d9,#4c1d95);display:flex;align-items:center;justify-content:center;}
    .now-info{flex:1;min-width:0;}
    .now-title{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .now-ch{font-size:11px;color:var(--muted);margin-top:2px;}

    .controls{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;}
    .ctrl-btns{display:flex;align-items:center;gap:20px;}
    .ctrl-btn{background:none;border:none;color:rgba(255,255,255,.45);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:4px;border-radius:50%;transition:color .12s;}
    .ctrl-btn:hover{color:#fff;}
    .play-btn{width:38px;height:38px;background:#fff;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s;}
    .play-btn:hover{transform:scale(1.07);}

    /* SMOOTH PROGRESS */
    .progress-wrap{display:flex;align-items:center;gap:10px;width:100%;max-width:500px;}
    .time{font-size:11px;color:var(--muted);min-width:34px;font-variant-numeric:tabular-nums;}
    .prog-track{
      flex:1;height:4px;background:var(--dim);border-radius:2px;
      cursor:pointer;position:relative;transition:height .1s;
    }
    .prog-track:hover{height:6px;}
    .prog-fill{height:100%;background:var(--purple);border-radius:2px;pointer-events:none;}
    .prog-thumb{
      position:absolute;top:50%;right:-6px;transform:translateY(-50%);
      width:12px;height:12px;background:#fff;border-radius:50%;
      opacity:0;transition:opacity .15s;pointer-events:none;
    }
    .prog-track:hover .prog-thumb{opacity:1;}

    /* SMOOTH VOLUME */
    .vol-wrap{display:flex;align-items:center;gap:8px;width:130px;flex-shrink:0;}
    .vol-track{
      flex:1;height:4px;background:var(--dim);border-radius:2px;
      cursor:pointer;position:relative;transition:height .1s;
    }
    .vol-track:hover{height:6px;}
    .vol-fill{height:100%;background:rgba(255,255,255,.5);border-radius:2px;pointer-events:none;}
    .vol-thumb{
      position:absolute;top:50%;right:-6px;transform:translateY(-50%);
      width:12px;height:12px;background:#fff;border-radius:50%;
      opacity:0;transition:opacity .15s;pointer-events:none;
    }
    .vol-track:hover .vol-thumb{opacity:1;}

    @media(max-width:640px){
      #app{grid-template-columns:1fr;grid-template-rows:1fr 80px;}
      .sidebar{display:none;}
      .main{padding:14px;}
      .cards-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
      .now-playing{width:140px;}
    }
  </style>
</head>
<body>

<!-- ══ AUTH SCREEN ══════════════════════════════════ -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">son<span>•</span>iq</div>
    <div class="auth-sub">Ta musique, partout avec toi</div>

    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Connexion</div>
      <div class="auth-tab" onclick="switchTab('register')">Créer un compte</div>
    </div>

    <div class="auth-form">
      <input class="auth-input" id="authEmail" type="email" placeholder="Adresse email" />
      <input class="auth-input" id="authPass" type="password" placeholder="Mot de passe" onkeydown="if(event.key==='Enter') doEmailAuth()" />
      <div style="text-align:right;margin-top:5px;"><span onclick="doForgotPassword()" style="font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;">Mot de passe oublié ?</span></div>
      <div class="auth-error" id="authError"></div>
      <div id="authSuccess" style="font-size:12.5px;color:#4ade80;text-align:center;min-height:16px;"></div>
      <button class="auth-btn" id="authSubmitBtn" onclick="doEmailAuth()">Se connecter</button>

      <div class="auth-divider">ou continuer avec</div>

      <button class="oauth-btn" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continuer avec Google
      </button>

      <button class="oauth-btn" onclick="doApple()">
        <svg width="18" height="18" viewBox="0 0 814 1000"><path fill="currentColor" d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.8 0 663.4 0 541.8c0-207.9 135.4-318.1 268.8-318.1 71 0 130.3 46.4 174.5 46.4 42.8 0 109.8-49.9 190.5-49.9 30.5 0 110.2 2.6 167.7 100.3zM549.7 160.5c25.5-35.2 43.7-84.3 43.7-133.4 0-6.5-.6-13-1.9-18.2-41.5 1.3-91.4 27.7-121.7 63.3-22.5 25.5-44.3 74-44.3 123.8 0 7.1 1.3 14.3 1.9 16.5 2.6.6 6.5 1.3 10.4 1.3 37.1 0 84.4-24.8 111.9-53.3z"/></svg>
        Continuer avec Apple
      </button>
    </div>

    <div class="guest-link" onclick="continueAsGuest()">Continuer sans compte (accès limité)</div>
  </div>
</div>

<!-- ══ APP ══════════════════════════════════════════ -->
<div id="app">
  <aside class="sidebar">
    <div class="logo">son<span>•</span>iq</div>

    <div class="user-chip" id="userChip">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-name" id="userName">Invité</div>
      <div class="logout-btn" onclick="doLogout()">↩</div>
    </div>

    <div class="nav-label">Menu</div>
    <div class="nav-item active" id="navHome" onclick="goHome()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Accueil
    </div>
    <div class="nav-item" id="navSearch" onclick="focusSearch()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      Rechercher
    </div>
    <div class="nav-item" id="navFavs" onclick="showFavs()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      Favoris
    </div>

    <div class="nav-label">Récemment écouté</div>
    <div id="historyList">
      <div style="padding:8px 10px;font-size:11.5px;color:var(--muted);">Rien encore...</div>
    </div>
  </aside>

  <main class="main" id="mainArea">
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="🎵  Recherche une chanson, artiste..." onkeydown="if(event.key==='Enter') doSearch()"/>
      <button class="search-btn" id="searchBtn" onclick="doSearch()">Rechercher</button>
    </div>
    <div id="mainContent"></div>
  </main>

  <div class="player-bar">
    <div class="now-playing">
      <div class="now-thumb-wrap">
        <img id="nowThumbImg" src="" alt="" style="display:none"/>
        <div class="now-placeholder" id="nowPlaceholder">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
      </div>
      <div class="now-info">
        <div class="now-title" id="nowTitle">Aucune lecture</div>
        <div class="now-ch" id="nowCh">—</div>
      </div>
    </div>

    <div class="controls">
      <div class="ctrl-btns">
        <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="prevTrack()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="play-btn" id="playBtn" onclick="togglePlay()">
          <svg id="playIcon" width="15" height="15" viewBox="0 0 24 24" fill="#0d0d14"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="nextTrack()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18 14.5 12 6 6v12zm8.5-12v12h2V6h-2z"/></svg>
        </button>
        <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
      </div>
      <div class="progress-wrap">
        <span class="time" id="curTime">0:00</span>
        <div class="prog-track" id="progTrack">
          <div class="prog-fill" id="progFill" style="width:0%"></div>
          <div class="prog-thumb" id="progThumb"></div>
        </div>
        <span class="time" id="totTime">0:00</span>
      </div>
    </div>

    <div class="vol-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--muted)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <div class="vol-track" id="volTrack">
        <div class="vol-fill" id="volFill" style="width:70%"></div>
        <div class="vol-thumb" id="volThumb"></div>
      </div>
    </div>
  </div>
</div>

<div id="yt-player" style="position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;left:-9999px;"></div>

<script>
// ── FIREBASE CONFIG ── remplace par tes propres valeurs après avoir créé le projet Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAzKwE7qMPl1aqq563W56InMDGp6T9hcNA",
  authDomain: "soniq-78c6d.firebaseapp.com",
  projectId: "soniq-78c6d",
  storageBucket: "soniq-78c6d.firebasestorage.app",
  messagingSenderId: "82081439170",
  appId: "1:82081439170:web:9b02119c1742b00d43ca5b"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const YOUTUBE_KEY = 'AIzaSyDomQ_Lq4r-2OMTCNaJlysUPMHelSLsRlk';

// ── STATE ──
let results=[], favorites=[], history=[], currentList=[], currentIdx=-1;
let isPlaying=false, isShuffle=false, isRepeat=false, isGuest=false;
let player=null, ytReady=false, pendingId=null, rafId=null;
let isDraggingProg=false, isDraggingVol=false;
let currentUser=null;

const $=id=>document.getElementById(id);

// ── AUTH ──────────────────────────────────────────────────────
let currentTab='login';

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
  $('authSubmitBtn').textContent=tab==='login'?'Se connecter':'Créer un compte';
  $('authError').textContent='';
  if($('authSuccess')) $('authSuccess').textContent='';
}

async function doEmailAuth(){
  const email=$('authEmail').value.trim();
  const pass=$('authPass').value;
  $('authError').textContent='';
  if($('authSuccess')) $('authSuccess').textContent='';
  $('authSubmitBtn').disabled=true;
  try{
    if(currentTab==='login'){
      await auth.signInWithEmailAndPassword(email,pass);
    } else {
      await auth.createUserWithEmailAndPassword(email,pass);
    }
  } catch(e){
    $('authError').textContent=friendlyError(e.code);
    $('authSubmitBtn').disabled=false;
  }
}

async function doForgotPassword(){
  const email=$('authEmail').value.trim();
  $('authError').textContent='';
  if($('authSuccess')) $('authSuccess').textContent='';
  if(!email){ $('authError').textContent="Entre ton email d'abord."; return; }
  try{
    await auth.sendPasswordResetEmail(email);
    if($('authSuccess')) $('authSuccess').textContent='Email de reinitialisation envoye !';
  } catch(e){
    $('authError').textContent=friendlyError(e.code);
  }
}

async function doGoogle(){
  const provider=new firebase.auth.GoogleAuthProvider();
  try{ await auth.signInWithPopup(provider); }
  catch(e){ $('authError').textContent=friendlyError(e.code); }
}

async function doApple(){
  const provider=new firebase.auth.OAuthProvider('apple.com');
  try{ await auth.signInWithPopup(provider); }
  catch(e){ $('authError').textContent=friendlyError(e.code); }
}

function continueAsGuest(){
  isGuest=true;
  showApp({displayName:'Invité',email:''});
}

async function doLogout(){
  if(!isGuest) await auth.signOut();
  isGuest=false;
  currentUser=null;
  $('app').style.display='none';
  $('authScreen').style.display='flex';
}

function friendlyError(code){
  const map={
    'auth/invalid-email':'Email invalide.',
    'auth/user-not-found':'Aucun compte avec cet email.',
    'auth/wrong-password':'Mot de passe incorrect.',
    'auth/email-already-in-use':'Cet email est déjà utilisé.',
    'auth/weak-password':'Mot de passe trop court (6 caractères min).',
    'auth/popup-closed-by-user':'Connexion annulée.',
    'auth/configuration-not-found':'Firebase non configuré — mode démo actif.',
  };
  return map[code]||'Erreur : '+code;
}

auth.onAuthStateChanged(user=>{
  if(user){ showApp(user); }
});

function showApp(user){
  currentUser=user;
  $('authScreen').style.display='none';
  $('app').style.display='grid';
  const name=user.displayName||user.email?.split('@')[0]||'Invité';
  $('userName').textContent=name;
  $('userAvatar').textContent=name[0].toUpperCase();
  loadFromStorage();
  loadHome();
}

// ── STORAGE ──
function loadFromStorage(){
  try{
    const key=currentUser?.uid||'guest';
    favorites=JSON.parse(localStorage.getItem('soniq_favs_'+key)||'[]');
    history=JSON.parse(localStorage.getItem('soniq_hist_'+key)||'[]');
  }catch(e){}
}
function saveStorage(){
  try{
    const key=currentUser?.uid||'guest';
    localStorage.setItem('soniq_favs_'+key,JSON.stringify(favorites));
    localStorage.setItem('soniq_hist_'+key,JSON.stringify(history));
  }catch(e){}
}

// ── YOUTUBE IFRAME ────────────────────────────────────────────
const ytScript=document.createElement('script');
ytScript.src='https://www.youtube.com/iframe_api';
document.head.appendChild(ytScript);

window.onYouTubeIframeAPIReady=()=>{
  player=new YT.Player('yt-player',{
    height:'1',width:'1',
    playerVars:{autoplay:1,playsinline:1},
    events:{
      onReady:()=>{ ytReady=true; player.setVolume(70); if(pendingId){player.loadVideoById(pendingId);pendingId=null;} },
      onStateChange:e=>{
        if(e.data===YT.PlayerState.PLAYING){ isPlaying=true; updatePlayBtn(); startRAF(); }
        if(e.data===YT.PlayerState.PAUSED){ isPlaying=false; updatePlayBtn(); }
        if(e.data===YT.PlayerState.ENDED){ isRepeat?player.seekTo(0):nextTrack(); }
      }
    }
  });
};

// ── HOME PAGE ─────────────────────────────────────────────────
const GENRES=[
  {label:'🔥 Tendances',q:'top hits 2025'},
  {label:'🎵 Pop',q:'pop hits 2025'},
  {label:'🎤 Hip-Hop',q:'hip hop hits 2025'},
  {label:'💜 R&B',q:'rnb 2025'},
  {label:'🎸 Rock',q:'rock hits 2025'},
  {label:'⚡ Électro',q:'electronic music 2025'},
  {label:'🎹 Classique',q:'classical music'},
  {label:'🌊 Chill',q:'chill lofi music'},
];
let activeGenre=0;

async function loadHome(){
  setNav('home');
  $('mainContent').innerHTML=`
    ${isGuest?`<div class="guest-banner"><p>👋 Tu es en mode invité. Crée un compte pour sauvegarder tes favoris et accéder à toutes les fonctionnalités.</p><button class="banner-btn" onclick="doLogout()">Créer un compte</button></div>`:''}
    <div class="genre-pills" id="genrePills"></div>
    <div class="loading-row"><div class="spinner"></div>Chargement des tendances...</div>
  `;
  renderGenrePills();
  await fetchGenre(activeGenre);
}

function renderGenrePills(){
  const container=$('genrePills');
  if(!container)return;
  container.innerHTML='';
  GENRES.forEach((g,i)=>{
    const btn=document.createElement('button');
    btn.className='genre-pill'+(i===activeGenre?' active':'');
    btn.textContent=g.label;
    btn.onclick=()=>{ activeGenre=i; renderGenrePills(); fetchGenre(i); };
    container.appendChild(btn);
  });
}

async function fetchGenre(idx){
  const mc=$('mainContent');
  if(!mc)return;
  // keep pills, replace rest
  const pills=mc.querySelector('.genre-pills')?.outerHTML||'';
  const banner=mc.querySelector('.guest-banner')?.outerHTML||'';
  mc.innerHTML=banner+pills+'<div class="loading-row"><div class="spinner"></div>Chargement...</div>';

  try{
    const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&maxResults=16&q=${encodeURIComponent(GENRES[idx].q)}&key=${YOUTUBE_KEY}`;
    const res=await fetch(url);
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    results=parseItems(data.items||[]);
    currentList=results;
    const newPills=$('genrePills')?.outerHTML||pills;
    mc.innerHTML=banner+newPills+`
      <div class="section-header"><div class="section-title">${GENRES[idx].label}</div></div>
      <div class="cards-grid" id="grid"></div>
    `;
    renderGenrePills();
    renderGrid(results);
  }catch(e){
    mc.innerHTML=banner+(mc.querySelector('.genre-pills')?.outerHTML||'')+`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">${e.message}</div></div>`;
  }
}

// ── SEARCH ────────────────────────────────────────────────────
async function doSearch(){
  const q=$('searchInput').value.trim();
  if(!q)return;
  setNav('search');
  $('searchBtn').disabled=true;
  $('searchBtn').textContent='...';
  $('mainContent').innerHTML='<div class="loading-row"><div class="spinner"></div>Recherche en cours...</div>';
  try{
    const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&maxResults=16&q=${encodeURIComponent(q)}&key=${YOUTUBE_KEY}`;
    const res=await fetch(url);
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    results=parseItems(data.items||[]);
    currentList=results;
    $('mainContent').innerHTML=`<div class="section-header"><div class="section-title">Résultats <span style="font-size:12px;color:var(--muted);font-weight:400;">(${results.length})</span></div></div><div class="cards-grid" id="grid"></div>`;
    renderGrid(results);
  }catch(e){
    $('mainContent').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Erreur : ${e.message}</div></div>`;
  }finally{
    $('searchBtn').disabled=false;
    $('searchBtn').textContent='Rechercher';
  }
}

function parseItems(items){
  return items.map(item=>({
    id:item.id.videoId,
    title:item.snippet.title,
    channel:item.snippet.channelTitle,
    thumb:item.snippet.thumbnails.medium?.url||item.snippet.thumbnails.default?.url
  }));
}

// ── RENDER GRID ───────────────────────────────────────────────
function renderGrid(list){
  const grid=$('grid');
  if(!grid)return;
  grid.innerHTML='';
  list.forEach((v,i)=>{
    const isFav=favorites.some(f=>f.id===v.id);
    const isNow=currentList[currentIdx]?.id===v.id;
    const card=document.createElement('div');
    card.className='card'+(isNow?' playing':'');
    card.innerHTML=`
      <div class="thumb-wrap">
        <img class="thumb-img" src="${v.thumb}" alt="" loading="lazy"/>
        <div class="play-overlay">
          ${isNow&&isPlaying
            ?'<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
            :'<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>'
          }
        </div>
      </div>
      <div class="card-info">
        <div class="card-title">${v.title}</div>
        <div class="card-ch">
          <span>${v.channel}</span>
          <span class="fav-btn" data-id="${v.id}" data-i="${i}" onclick="toggleFav(event)">${isFav?'♥':'♡'}</span>
        </div>
      </div>
    `;
    card.addEventListener('click',e=>{ if(e.target.classList.contains('fav-btn'))return; currentList=list; playTrack(i); });
    grid.appendChild(card);
  });
}

// ── PLAY ──────────────────────────────────────────────────────
function playTrack(idx){
  if(!currentList[idx])return;
  currentIdx=idx;
  const v=currentList[idx];
  $('nowTitle').textContent=v.title;
  $('nowCh').textContent=v.channel;
  $('nowThumbImg').src=v.thumb;
  $('nowThumbImg').style.display='block';
  $('nowPlaceholder').style.display='none';
  if(ytReady){ player.loadVideoById(v.id); } else { pendingId=v.id; }
  isPlaying=true;
  updatePlayBtn();
  addToHistory(v);
  renderGrid(currentList);
}

function togglePlay(){
  if(currentIdx<0)return;
  if(!ytReady)return;
  isPlaying?player.pauseVideo():player.playVideo();
}

function nextTrack(){
  if(!currentList.length)return;
  const next=isShuffle?Math.floor(Math.random()*currentList.length):(currentIdx+1)%currentList.length;
  playTrack(next);
}
function prevTrack(){
  if(!currentList.length)return;
  playTrack((currentIdx-1+currentList.length)%currentList.length);
}
function toggleShuffle(){ isShuffle=!isShuffle; $('shuffleBtn').style.color=isShuffle?'var(--purple)':''; }
function toggleRepeat(){ isRepeat=!isRepeat; $('repeatBtn').style.color=isRepeat?'var(--purple)':''; }

function updatePlayBtn(){
  $('playIcon').innerHTML=isPlaying
    ?'<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    :'<path d="M8 5v14l11-7z"/>';
}

// ── SMOOTH PROGRESS (RAF) ─────────────────────────────────────
function startRAF(){
  cancelAnimationFrame(rafId);
  function tick(){
    if(!ytReady||!player.getCurrentTime)return;
    try{
      const cur=player.getCurrentTime()||0;
      const dur=player.getDuration()||1;
      if(!isDraggingProg){
        const pct=(cur/dur)*100;
        $('progFill').style.width=pct+'%';
        $('progThumb').style.right=(-6)+'px'; // always flush
        $('curTime').textContent=fmt(cur);
        $('totTime').textContent=fmt(dur);
      }
    }catch(_){}
    rafId=requestAnimationFrame(tick);
  }
  rafId=requestAnimationFrame(tick);
}

function fmt(s){
  s=Math.floor(s||0);
  return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;
}

// ── DRAG: PROGRESS ────────────────────────────────────────────
function getPct(e,el){
  const r=el.getBoundingClientRect();
  const clientX=e.touches?e.touches[0].clientX:e.clientX;
  return Math.max(0,Math.min(1,(clientX-r.left)/r.width));
}

$('progTrack').addEventListener('mousedown',e=>{ isDraggingProg=true; scrubProg(e); });
$('progTrack').addEventListener('touchstart',e=>{ isDraggingProg=true; scrubProg(e); },{passive:true});

document.addEventListener('mousemove',e=>{ if(isDraggingProg) scrubProg(e); if(isDraggingVol) scrubVol(e); });
document.addEventListener('touchmove',e=>{ if(isDraggingProg) scrubProg(e); if(isDraggingVol) scrubVol(e); },{passive:true});
document.addEventListener('mouseup',e=>{
  if(isDraggingProg){ commitProg(e); isDraggingProg=false; }
  if(isDraggingVol){ isDraggingVol=false; }
});
document.addEventListener('touchend',e=>{
  if(isDraggingProg){ commitProg(e); isDraggingProg=false; }
  if(isDraggingVol){ isDraggingVol=false; }
});

function scrubProg(e){
  const pct=getPct(e,$('progTrack'));
  $('progFill').style.width=(pct*100)+'%';
  if(ytReady) $('curTime').textContent=fmt(pct*(player.getDuration()||0));
}
function commitProg(e){
  const pct=getPct(e,$('progTrack'));
  if(ytReady) player.seekTo(pct*(player.getDuration()||0),true);
}

// ── DRAG: VOLUME ──────────────────────────────────────────────
$('volTrack').addEventListener('mousedown',e=>{ isDraggingVol=true; scrubVol(e); });
$('volTrack').addEventListener('touchstart',e=>{ isDraggingVol=true; scrubVol(e); },{passive:true});

function scrubVol(e){
  const pct=getPct(e,$('volTrack'));
  $('volFill').style.width=(pct*100)+'%';
  if(ytReady) player.setVolume(Math.round(pct*100));
}

// ── FAVORITES ─────────────────────────────────────────────────
function toggleFav(e){
  e.stopPropagation();
  if(isGuest){ alert('Crée un compte pour sauvegarder tes favoris !'); return; }
  const id=e.target.dataset.id;
  const idx=parseInt(e.target.dataset.i);
  const v=currentList[idx];
  const fi=favorites.findIndex(f=>f.id===id);
  if(fi>=0){ favorites.splice(fi,1); e.target.textContent='♡'; }
  else { favorites.push(v); e.target.textContent='♥'; }
  saveStorage();
}

function showFavs(){
  setNav('favs');
  currentList=favorites;
  currentIdx=0;
  if(!favorites.length){
    $('mainContent').innerHTML='<div class="empty-state"><div class="empty-icon">♡</div><div class="empty-text">Aucun favori encore.<br>Clique sur ♡ sur une chanson.</div></div>';
    return;
  }
  $('mainContent').innerHTML=`<div class="section-header"><div class="section-title">Mes favoris <span style="font-size:12px;color:var(--muted);font-weight:400;">(${favorites.length})</span></div></div><div class="cards-grid" id="grid"></div>`;
  renderGrid(favorites);
}

// ── HISTORY ───────────────────────────────────────────────────
function addToHistory(v){
  history=history.filter(h=>h.id!==v.id);
  history.unshift(v);
  if(history.length>8)history.pop();
  saveStorage();
  renderHistory();
}
function renderHistory(){
  const list=$('historyList');
  list.innerHTML='';
  if(!history.length){ list.innerHTML='<div style="padding:8px 10px;font-size:11.5px;color:var(--muted);">Rien encore...</div>'; return; }
  history.forEach((v,i)=>{
    const item=document.createElement('div');
    item.className='history-item';
    item.innerHTML=`<img class="h-thumb" src="${v.thumb}" alt=""/><div class="h-info"><div class="h-title">${v.title}</div><div class="h-ch">${v.channel}</div></div>`;
    item.onclick=()=>{ currentList=history; playTrack(i); setNav('home'); };
    list.appendChild(item);
  });
}

// ── NAVIGATION ────────────────────────────────────────────────
function setNav(which){
  ['navHome','navSearch','navFavs'].forEach(id=>$(id).classList.remove('active'));
  if(which==='home') $('navHome').classList.add('active');
  if(which==='search') $('navSearch').classList.add('active');
  if(which==='favs') $('navFavs').classList.add('active');
}
function goHome(){ loadHome(); }
function focusSearch(){ setNav('search'); $('searchInput').focus(); }

renderHistory();
</script>
